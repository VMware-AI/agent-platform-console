name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Merge gate only: lint + type-check + build. Per CLAUDE.md §2 this is the
# only thing that must be green before merging. Tests are NOT run on push/PR
# — they run weekly + on demand via test.yml, per CLAUDE.md §1.
jobs:
  gate:
    name: Lint, type-check & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
